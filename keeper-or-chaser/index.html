    <style>
      /* ============================================
         CSS Custom Properties
         ============================================ */
      :root {
        --navy: #1B1464;
        --pink: #E84F9A;
        --blue: #4A8FE7;
        --gradient-pink: linear-gradient(135deg, #F472B6, #DB2777);
        --gradient-blue: linear-gradient(135deg, #60A5FA, #2563EB);
        --navy-90: rgba(27, 20, 100, 0.9);
        --navy-70: rgba(27, 20, 100, 0.7);
        --navy-60: rgba(27, 20, 100, 0.6);
        --navy-50: rgba(27, 20, 100, 0.5);
        --navy-40: rgba(27, 20, 100, 0.4);
        --navy-15: rgba(27, 20, 100, 0.15);
        --navy-08: rgba(27, 20, 100, 0.08);
        --navy-04: rgba(27, 20, 100, 0.04);
        --pink-15: rgba(232, 79, 154, 0.15);
        --pink-08: rgba(232, 79, 154, 0.08);
        --blue-15: rgba(74, 143, 231, 0.15);
        --blue-08: rgba(74, 143, 231, 0.08);
      }

      /* ============================================
         Reset & Base
         ============================================ */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Onest', system-ui, sans-serif;
        background: #ffffff;
        color: var(--navy);
        min-height: 100vh;
        overflow-x: hidden;
        position: relative;
        line-height: 1.6;
      }

      body::before {
        content: '';
        position: fixed;
        top: -40%;
        left: -20%;
        width: 60%;
        height: 80%;
        background: radial-gradient(ellipse, var(--pink-08) 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
      }

      body::after {
        content: '';
        position: fixed;
        bottom: -30%;
        right: -10%;
        width: 50%;
        height: 70%;
        background: radial-gradient(ellipse, var(--blue-08) 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
      }

      h1, h2, h3 {
        font-family: 'Fraunces', serif;
        line-height: 1.1;
      }

      /* ============================================
         Screen visibility
         ============================================ */
      .screen {
        display: none;
        position: relative;
        z-index: 1;
      }

      .screen.active {
        display: flex;
      }

      /* ============================================
         Intro Screen
         ============================================ */
      #screen-intro {
        min-height: 100dvh;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.5rem;
        text-align: center;
      }

      .intro-logo {
        height: 40px;
        margin-bottom: 2rem;
      }

      .intro-title {
        font-size: clamp(2rem, 5vw, 3.2rem);
        max-width: 560px;
        margin-bottom: 1rem;
        color: var(--navy);
      }

      .intro-body {
        font-size: 1.05rem;
        color: var(--navy-60);
        max-width: 440px;
        margin-bottom: 2rem;
      }

      .intro-label {
        font-family: 'Figtree', sans-serif;
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--navy-40);
        margin-bottom: 2rem;
      }

      .btn-quiz {
        font-family: 'Onest', system-ui, sans-serif;
        background: var(--pink);
        color: #fff;
        padding: 0.9rem 2.4rem;
        border-radius: 8px;
        border: none;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .btn-quiz:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 16px rgba(232, 79, 154, 0.3);
      }

      .btn-quiz:active {
        transform: translateY(0);
      }

      /* ============================================
         Quiz Screen
         ============================================ */
      #screen-quiz {
        min-height: 100dvh;
        flex-direction: column;
        max-width: 600px;
        margin: 0 auto;
        width: 100%;
      }

      .quiz-topbar {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 1rem 1.5rem;
      }

      .quiz-back {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--navy-40);
        padding: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 6px;
        transition: color 0.2s ease;
      }

      .quiz-back:hover {
        color: var(--navy);
      }

      .quiz-back.hidden {
        visibility: hidden;
      }

      .quiz-progress {
        flex: 1;
        height: 4px;
        background: var(--navy-08);
        border-radius: 2px;
        overflow: hidden;
      }

      .quiz-progress-fill {
        height: 100%;
        background: var(--gradient-pink);
        border-radius: 2px;
        transition: width 0.4s ease;
      }

      .quiz-progress-label {
        font-family: 'Figtree', sans-serif;
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--navy-40);
        white-space: nowrap;
      }

      .quiz-body {
        flex: 1;
        position: relative;
        overflow: hidden;
      }

      .quiz-question-card {
        padding: 1rem 1.5rem 2rem;
        transition: transform 0.35s ease, opacity 0.35s ease;
      }

      .quiz-question-card.slide-out-left {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        transform: translateX(-100%);
        opacity: 0;
      }

      .quiz-question-card.slide-in-right {
        transform: translateX(100%);
        opacity: 0;
      }

      .quiz-question-card.slide-out-right {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        transform: translateX(100%);
        opacity: 0;
      }

      .quiz-question-card.slide-in-left {
        transform: translateX(-100%);
        opacity: 0;
      }

      .quiz-question-text {
        font-size: clamp(1.3rem, 3.5vw, 1.7rem);
        margin-bottom: 1.5rem;
        line-height: 1.25;
      }

      .quiz-options {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .quiz-option {
        display: flex;
        align-items: flex-start;
        gap: 0.75rem;
        padding: 1rem 1.25rem;
        background: #fff;
        border: 2px solid var(--navy-08);
        border-radius: 16px;
        cursor: pointer;
        transition: border-color 0.2s ease, background 0.2s ease;
        text-align: left;
        font-family: 'Onest', system-ui, sans-serif;
        font-size: 0.95rem;
        color: var(--navy);
        line-height: 1.5;
        width: 100%;
      }

      .quiz-option:hover {
        border-color: var(--navy-15);
        background: var(--navy-04);
      }

      .quiz-option--selected {
        border-color: var(--pink);
        background: var(--pink-08);
      }

      .quiz-option--selected:hover {
        border-color: var(--pink);
        background: var(--pink-08);
      }

      .quiz-option-letter {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        min-width: 28px;
        border-radius: 50%;
        background: var(--pink-08);
        color: var(--pink);
        font-family: 'Figtree', sans-serif;
        font-weight: 600;
        font-size: 0.8rem;
      }

      .quiz-option-text {
        flex: 1;
        padding-top: 2px;
      }

      .quiz-option-check {
        display: none;
        align-items: center;
        justify-content: center;
        color: var(--pink);
        margin-top: 2px;
      }

      .quiz-option--selected .quiz-option-check {
        display: flex;
      }
    </style>
  </head>
  <body>

    <div id="screen-intro" class="screen active">
      <img src="/images/logo-header.png" alt="SuperDuper" class="intro-logo" />
      <h1 class="intro-title">Are You a Keeper or a Chaser?</h1>
      <p class="intro-body">Every household has one parent who tracks everything and one who's always asking. Which one are you?</p>
      <p class="intro-label">6 Questions. 60 Seconds.</p>
      <button class="btn-quiz" id="btn-start">Find Out</button>
    </div>

    <div id="screen-quiz" class="screen">
      <div class="quiz-topbar">
        <button class="quiz-back hidden" id="quiz-back" aria-label="Go back">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="24" height="24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" /></svg>
        </button>
        <div class="quiz-progress">
          <div class="quiz-progress-fill" id="quiz-progress-fill" style="width: 0%"></div>
        </div>
        <span class="quiz-progress-label" id="quiz-progress-label">Q1 of 6</span>
      </div>
      <div class="quiz-body" id="quiz-body" aria-live="polite">
      </div>
    </div>

    <div id="screen-gate" class="screen">
    </div>

    <div id="screen-results" class="screen">
    </div>

    <script>
      /* ============================================
         Screen Navigation
         ============================================ */
      function showScreen(id) {
        document.querySelectorAll('.screen').forEach(function(s) {
          s.classList.remove('active');
        });
        document.getElementById(id).classList.add('active');
        window.scrollTo(0, 0);
      }

      /* ============================================
         Quiz Data
         ============================================ */
      var QUESTIONS = [
        {
          question: "It's Sunday night. How do you know what's happening this week?",
          options: [
            { text: "I already checked every email, every group chat, and the school portal. The week is mapped.", score: 'keeper' },
            { text: "I'll ask my partner in the morning. They usually know.", score: 'chaser' },
            { text: "We sort of piece it together as we go. Some weeks are smoother than others.", score: 'hybrid' }
          ]
        },
        {
          question: "A permission slip is due tomorrow. Where is it?",
          options: [
            { text: "Signed, in the folder, ready to go. I handled it the day it came home.", score: 'keeper' },
            { text: "Wait, there's a permission slip? Let me check the backpack.", score: 'chaser' },
            { text: "I saw the email but haven't printed it yet. I'll do it tonight.", score: 'hybrid' }
          ]
        },
        {
          question: "Your kid mentions a half day at school on Friday. Your reaction?",
          options: [
            { text: "I know. I already arranged coverage and moved my afternoon meeting.", score: 'keeper' },
            { text: "This Friday? I had no idea. Let me figure out what to do.", score: 'chaser' },
            { text: "I think I saw something about that. Let me double-check the calendar.", score: 'hybrid' }
          ]
        },
        {
          question: "Soccer practice got moved to a different field. How do you find out?",
          options: [
            { text: "I read the coach's email the minute it came in and updated the family calendar.", score: 'keeper' },
            { text: "I show up at the wrong field and text my partner from the parking lot.", score: 'chaser' },
            { text: "I saw the notification but forgot which field it said. I'll look it up on the way.", score: 'hybrid' }
          ]
        },
        {
          question: "How does your partner usually find out what's happening with the kids?",
          options: [
            { text: "From me. I'm the source of truth for this household.", score: 'keeper' },
            { text: "From me asking them. They're the one with the master plan.", score: 'chaser' },
            { text: "We each know different things and hope we've covered everything.", score: 'hybrid' }
          ]
        },
        {
          question: "Be honest: how does the current system make you feel?",
          options: [
            { text: "Exhausted. I carry the mental load and nobody sees it.", score: 'keeper' },
            { text: "Guilty. I know I should be more on top of things but I can't keep up.", score: 'chaser' },
            { text: "Stressed. We're both trying but things still fall through the cracks.", score: 'hybrid' }
          ]
        }
      ];

      /* ============================================
         Quiz State
         ============================================ */
      var state = {
        currentQuestion: 0,
        answers: [null, null, null, null, null, null],
        scores: { keeper: 0, hybrid: 0, chaser: 0 }
      };

      function calculateResult() {
        var scores = { keeper: 0, hybrid: 0, chaser: 0 };
        for (var i = 0; i < state.answers.length; i++) {
          if (state.answers[i] !== null) {
            var category = QUESTIONS[i].options[state.answers[i]].score;
            scores[category]++;
          }
        }
        state.scores = scores;

        if (scores.keeper > scores.chaser && scores.keeper > scores.hybrid) return 'keeper';
        if (scores.chaser > scores.keeper && scores.chaser > scores.hybrid) return 'chaser';
        return 'hybrid';
      }

      function resetQuiz() {
        state.currentQuestion = 0;
        state.answers = [null, null, null, null, null, null];
        state.scores = { keeper: 0, hybrid: 0, chaser: 0 };
      }

      /* ============================================
         Quiz Rendering & Transitions
         ============================================ */
      var isTransitioning = false;
      var LETTERS = ['A', 'B', 'C'];

      function buildQuestionCard(index) {
        var q = QUESTIONS[index];
        var card = document.createElement('div');
        card.className = 'quiz-question-card';

        var h2 = document.createElement('h2');
        h2.className = 'quiz-question-text';
        h2.textContent = q.question;
        card.appendChild(h2);

        var optionsDiv = document.createElement('div');
        optionsDiv.className = 'quiz-options';

        for (var i = 0; i < q.options.length; i++) {
          (function(optIndex) {
            var btn = document.createElement('button');
            btn.className = 'quiz-option';
            if (state.answers[index] === optIndex) {
              btn.classList.add('quiz-option--selected');
            }
            btn.setAttribute('type', 'button');

            btn.innerHTML =
              '<span class="quiz-option-letter">' + LETTERS[optIndex] + '</span>' +
              '<span class="quiz-option-text">' + q.options[optIndex].text + '</span>' +
              '<span class="quiz-option-check"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="20" height="20"><path fill-rule="evenodd" d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16Zm3.857-9.809a.75.75 0 0 0-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 1 0-1.06 1.061l2.5 2.5a.75.75 0 0 0 1.137-.089l4-5.5Z" clip-rule="evenodd" /></svg></span>';

            btn.addEventListener('click', function() {
              selectOption(index, optIndex);
            });

            optionsDiv.appendChild(btn);
          })(i);
        }

        card.appendChild(optionsDiv);
        return card;
      }

      function renderQuestion(index) {
        state.currentQuestion = index;
        var body = document.getElementById('quiz-body');
        body.innerHTML = '';
        var card = buildQuestionCard(index);
        body.appendChild(card);
        updateProgress();
      }

      function updateProgress() {
        var pct = ((state.currentQuestion + 1) / QUESTIONS.length) * 100;
        document.getElementById('quiz-progress-fill').style.width = pct + '%';
        document.getElementById('quiz-progress-label').textContent = 'Q' + (state.currentQuestion + 1) + ' of ' + QUESTIONS.length;

        var backBtn = document.getElementById('quiz-back');
        if (state.currentQuestion === 0) {
          backBtn.classList.add('hidden');
        } else {
          backBtn.classList.remove('hidden');
        }
      }

      function selectOption(questionIndex, optionIndex) {
        if (isTransitioning) return;

        state.answers[questionIndex] = optionIndex;

        // Visual feedback: mark selected
        var options = document.querySelectorAll('#quiz-body .quiz-option');
        options.forEach(function(opt, i) {
          opt.classList.toggle('quiz-option--selected', i === optionIndex);
        });

        try {
          posthog.capture('quiz_question_answered', {
            question: questionIndex + 1,
            answer: QUESTIONS[questionIndex].options[optionIndex].score
          });
        } catch(e) {}

        // Auto-advance after short delay
        setTimeout(function() {
          advanceQuestion();
        }, 400);
      }

      function advanceQuestion() {
        if (isTransitioning) return;
        var nextIndex = state.currentQuestion + 1;

        if (nextIndex >= QUESTIONS.length) {
          showGateScreen();
          return;
        }

        isTransitioning = true;
        var body = document.getElementById('quiz-body');
        var currentCard = body.querySelector('.quiz-question-card');

        // Slide current out left
        currentCard.classList.add('slide-out-left');

        // Build next card off-screen right
        var nextCard = buildQuestionCard(nextIndex);
        nextCard.classList.add('slide-in-right');
        body.appendChild(nextCard);

        // Trigger reflow then animate in
        nextCard.offsetHeight;
        nextCard.classList.remove('slide-in-right');

        state.currentQuestion = nextIndex;
        updateProgress();

        setTimeout(function() {
          if (currentCard.parentNode) currentCard.parentNode.removeChild(currentCard);
          isTransitioning = false;
        }, 350);
      }

      function goBack() {
        if (isTransitioning || state.currentQuestion === 0) return;
        isTransitioning = true;

        var prevIndex = state.currentQuestion - 1;
        var body = document.getElementById('quiz-body');
        var currentCard = body.querySelector('.quiz-question-card');

        // Slide current out right
        currentCard.classList.add('slide-out-right');

        // Build previous card off-screen left
        var prevCard = buildQuestionCard(prevIndex);
        prevCard.classList.add('slide-in-left');
        body.appendChild(prevCard);

        // Trigger reflow then animate in
        prevCard.offsetHeight;
        prevCard.classList.remove('slide-in-left');

        state.currentQuestion = prevIndex;
        updateProgress();

        setTimeout(function() {
          if (currentCard.parentNode) currentCard.parentNode.removeChild(currentCard);
          isTransitioning = false;
        }, 350);
      }

      document.getElementById('quiz-back').addEventListener('click', goBack);

      /* ============================================
         Intro Screen Handler
         ============================================ */
      document.getElementById('btn-start').addEventListener('click', function() {
        try { posthog.capture('quiz_started'); } catch(e) {}
        showScreen('screen-quiz');
        renderQuestion(0);
      });
    </script>
  </body>
