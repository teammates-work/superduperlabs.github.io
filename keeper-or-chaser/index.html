    <style>
      /* ============================================
         CSS Custom Properties
         ============================================ */
      :root {
        --navy: #1B1464;
        --pink: #E84F9A;
        --blue: #4A8FE7;
        --gradient-pink: linear-gradient(135deg, #F472B6, #DB2777);
        --gradient-blue: linear-gradient(135deg, #60A5FA, #2563EB);
        --navy-90: rgba(27, 20, 100, 0.9);
        --navy-70: rgba(27, 20, 100, 0.7);
        --navy-60: rgba(27, 20, 100, 0.6);
        --navy-50: rgba(27, 20, 100, 0.5);
        --navy-40: rgba(27, 20, 100, 0.4);
        --navy-15: rgba(27, 20, 100, 0.15);
        --navy-08: rgba(27, 20, 100, 0.08);
        --navy-04: rgba(27, 20, 100, 0.04);
        --pink-15: rgba(232, 79, 154, 0.15);
        --pink-08: rgba(232, 79, 154, 0.08);
        --blue-15: rgba(74, 143, 231, 0.15);
        --blue-08: rgba(74, 143, 231, 0.08);
      }

      /* ============================================
         Reset & Base
         ============================================ */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Onest', system-ui, sans-serif;
        background: #ffffff;
        color: var(--navy);
        min-height: 100vh;
        overflow-x: hidden;
        position: relative;
        line-height: 1.6;
      }

      body::before {
        content: '';
        position: fixed;
        top: -40%;
        left: -20%;
        width: 60%;
        height: 80%;
        background: radial-gradient(ellipse, var(--pink-08) 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
      }

      body::after {
        content: '';
        position: fixed;
        bottom: -30%;
        right: -10%;
        width: 50%;
        height: 70%;
        background: radial-gradient(ellipse, var(--blue-08) 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
      }

      h1, h2, h3 {
        font-family: 'Fraunces', serif;
        line-height: 1.1;
      }

      /* ============================================
         Screen visibility
         ============================================ */
      .screen {
        display: none;
        position: relative;
        z-index: 1;
      }

      .screen.active {
        display: flex;
      }
    </style>
  </head>
  <body>

    <div id="screen-intro" class="screen active">
    </div>

    <div id="screen-quiz" class="screen">
    </div>

    <div id="screen-gate" class="screen">
    </div>

    <div id="screen-results" class="screen">
    </div>

    <script>
      /* ============================================
         Screen Navigation
         ============================================ */
      function showScreen(id) {
        document.querySelectorAll('.screen').forEach(function(s) {
          s.classList.remove('active');
        });
        document.getElementById(id).classList.add('active');
        window.scrollTo(0, 0);
      }
    </script>
  </body>
