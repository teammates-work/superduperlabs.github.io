    <style>
      /* ============================================
         CSS Custom Properties
         ============================================ */
      :root {
        --navy: #1B1464;
        --magenta: #DD1C9D;
        --cyan: #00D0E7;
        --gradient-magenta: linear-gradient(135deg, #DD1C9D, #FF54C6);
        --gradient-cyan: linear-gradient(135deg, #00D0E7, #0077FF);
        --gradient-progress: linear-gradient(90deg, #DD1C9D, #0077FF);
        --navy-90: rgba(27, 20, 100, 0.9);
        --navy-70: rgba(27, 20, 100, 0.7);
        --navy-60: rgba(27, 20, 100, 0.6);
        --navy-50: rgba(27, 20, 100, 0.5);
        --navy-40: rgba(27, 20, 100, 0.4);
        --navy-15: rgba(27, 20, 100, 0.15);
        --navy-08: rgba(27, 20, 100, 0.08);
        --navy-04: rgba(27, 20, 100, 0.04);
        --magenta-15: rgba(221, 28, 157, 0.15);
        --magenta-08: rgba(221, 28, 157, 0.08);
        --cyan-15: rgba(0, 208, 231, 0.15);
        --cyan-08: rgba(0, 208, 231, 0.08);
      }

      /* ============================================
         Reset & Base
         ============================================ */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Onest', system-ui, sans-serif;
        background: #ffffff;
        color: var(--navy);
        min-height: 100vh;
        overflow-x: hidden;
        position: relative;
        line-height: 1.6;
      }

      body::before {
        content: '';
        position: fixed;
        top: -40%;
        left: -20%;
        width: 60%;
        height: 80%;
        background: radial-gradient(ellipse, var(--magenta-08) 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
      }

      body::after {
        content: '';
        position: fixed;
        bottom: -30%;
        right: -10%;
        width: 50%;
        height: 70%;
        background: radial-gradient(ellipse, var(--cyan-08) 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
      }

      h1, h2, h3 {
        font-family: 'Fraunces', serif;
        line-height: 1.1;
      }

      button:focus-visible,
      input:focus-visible,
      a:focus-visible {
        outline: 2px solid var(--magenta);
        outline-offset: 2px;
      }

      /* ============================================
         Screen visibility
         ============================================ */
      .screen {
        display: none;
        position: relative;
        z-index: 1;
      }

      .screen.active {
        display: flex;
      }

      /* ============================================
         Intro Screen
         ============================================ */
      #screen-intro {
        min-height: 100dvh;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.5rem;
        text-align: center;
      }

      .intro-logo {
        height: 40px;
        margin-bottom: 2rem;
      }

      .intro-title {
        font-size: clamp(2rem, 5vw, 3.2rem);
        max-width: 560px;
        margin-bottom: 2rem;
        color: var(--navy);
      }

      .btn-quiz {
        font-family: 'Onest', system-ui, sans-serif;
        background: var(--gradient-magenta);
        color: #fff;
        padding: 0.9rem 2.4rem;
        border-radius: 8px;
        border: none;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .btn-quiz:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 16px rgba(221, 28, 157, 0.3);
      }

      .btn-quiz:active {
        transform: translateY(0);
      }

      .intro-note {
        font-size: 0.85rem;
        color: var(--navy-40);
        margin-top: 0.75rem;
      }

      /* ============================================
         Quiz Screen
         ============================================ */
      #screen-quiz {
        min-height: 100dvh;
        flex-direction: column;
        max-width: 600px;
        margin: 0 auto;
        width: 100%;
      }

      .quiz-topbar {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 1rem 1.5rem;
      }

      .quiz-back {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--navy-40);
        padding: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 6px;
        transition: color 0.2s ease;
      }

      .quiz-back:hover {
        color: var(--navy);
      }

      .quiz-back.hidden {
        visibility: hidden;
      }

      .quiz-progress {
        flex: 1;
        height: 4px;
        background: var(--navy-08);
        border-radius: 2px;
        overflow: hidden;
      }

      .quiz-progress-fill {
        height: 100%;
        background: var(--gradient-progress);
        border-radius: 2px;
        transition: width 0.4s ease;
      }

      .quiz-progress-label {
        font-family: 'Figtree', sans-serif;
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--navy-40);
        white-space: nowrap;
      }

      .quiz-body {
        flex: 1;
        position: relative;
        overflow: hidden;
      }

      .quiz-question-card {
        padding: 1rem 1.5rem 2rem;
        transition: transform 0.35s ease, opacity 0.35s ease;
        will-change: transform, opacity;
      }

      .quiz-question-card.slide-out-left {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        transform: translateX(-100%);
        opacity: 0;
      }

      .quiz-question-card.slide-in-right {
        transform: translateX(100%);
        opacity: 0;
      }

      .quiz-question-card.slide-out-right {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        transform: translateX(100%);
        opacity: 0;
      }

      .quiz-question-card.slide-in-left {
        transform: translateX(-100%);
        opacity: 0;
      }

      .quiz-question-text {
        font-size: clamp(1.3rem, 3.5vw, 1.7rem);
        margin-bottom: 1.5rem;
        line-height: 1.25;
      }

      .quiz-options {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .quiz-option {
        display: flex;
        align-items: flex-start;
        gap: 0.75rem;
        padding: 1rem 1.25rem;
        min-height: 48px;
        background: #fff;
        border: 2px solid var(--navy-08);
        border-radius: 16px;
        cursor: pointer;
        transition: border-color 0.2s ease, background 0.2s ease;
        text-align: left;
        font-family: 'Onest', system-ui, sans-serif;
        font-size: 0.95rem;
        color: var(--navy);
        line-height: 1.5;
        width: 100%;
      }

      .quiz-option:hover {
        border-color: var(--navy-15);
        background: var(--navy-04);
      }

      .quiz-option--selected {
        border-color: var(--magenta);
        background: var(--magenta-08);
      }

      .quiz-option--selected:hover {
        border-color: var(--magenta);
        background: var(--magenta-08);
      }

      .quiz-option-letter {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        min-width: 28px;
        border-radius: 50%;
        background: var(--magenta-08);
        color: var(--magenta);
        font-family: 'Figtree', sans-serif;
        font-weight: 600;
        font-size: 0.8rem;
      }

      .quiz-option-text {
        flex: 1;
        padding-top: 2px;
      }

      .quiz-option-check {
        display: none;
        align-items: center;
        justify-content: center;
        color: var(--magenta);
        margin-top: 2px;
      }

      .quiz-option--selected .quiz-option-check {
        display: flex;
      }

      /* ============================================
         Gender Selection Screen
         ============================================ */
      #screen-gender {
        min-height: 100dvh;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.5rem;
        text-align: center;
      }

      .gender-prompt {
        font-size: 1rem;
        color: var(--navy-60);
        margin-bottom: 0.5rem;
      }

      .gender-heading {
        font-size: clamp(1.6rem, 4vw, 2.2rem);
        margin-bottom: 2rem;
        color: var(--navy);
      }

      .gender-options {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        width: 100%;
        max-width: 360px;
      }

      .gender-btn {
        font-family: 'Onest', system-ui, sans-serif;
        padding: 0.9rem 1.5rem;
        border: 2px solid var(--navy-15);
        border-radius: 50px;
        background: #fff;
        cursor: pointer;
        font-size: 1rem;
        font-weight: 500;
        color: var(--navy);
        transition: border-color 0.2s ease, background 0.2s ease;
      }

      .gender-btn:hover {
        border-color: var(--magenta);
        background: var(--magenta-08);
      }

      /* ============================================
         Results Screen
         ============================================ */
      #screen-results {
        min-height: 100dvh;
        flex-direction: column;
        align-items: center;
        padding: 2rem 1.5rem 3rem;
      }

      .results-logo {
        height: 32px;
        margin-bottom: 2rem;
      }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* Horizontal result card */
      .rcard {
        display: flex;
        background: #fff;
        border-radius: 24px;
        box-shadow: 0 4px 24px rgba(27, 20, 100, 0.08);
        overflow: hidden;
        max-width: 720px;
        width: 100%;
        margin-bottom: 2rem;
        animation: fadeUp 0.6s ease both;
      }

      .rcard-img {
        position: relative;
        width: 42%;
        min-height: 320px;
        flex-shrink: 0;
      }

      .rcard-img img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .rcard-share-overlay {
        position: absolute;
        bottom: 12px;
        right: 12px;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.9);
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--navy);
        box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        transition: background 0.2s ease;
      }

      .rcard-share-overlay:hover {
        background: #fff;
      }

      .rcard-copy {
        flex: 1;
        padding: 2rem 1.75rem;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .rcard-title {
        font-size: clamp(1.5rem, 3.5vw, 2rem);
        margin-bottom: 0.4rem;
      }

      .rcard-title--keeper { color: var(--magenta); }
      .rcard-title--chaser { color: var(--cyan); }
      .rcard-title--hybrid {
        background: linear-gradient(135deg, var(--magenta), var(--cyan));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .rcard-tagline {
        font-family: 'Fraunces', serif;
        font-style: italic;
        font-size: 0.95rem;
        color: var(--navy-60);
        margin-bottom: 1.25rem;
      }

      .rcard-validation {
        font-size: 0.92rem;
        line-height: 1.7;
        color: var(--navy-70);
      }

      .rcard-footnote {
        font-size: 0.75rem;
        color: var(--navy-40);
        margin-top: 0.75rem;
        line-height: 1.5;
      }

      /* Dark navy CTA block */
      .ctab {
        background: var(--navy);
        border-radius: 24px;
        padding: 2.5rem 2rem;
        max-width: 720px;
        width: 100%;
        margin-bottom: 2rem;
        animation: fadeUp 0.6s ease 0.15s both;
        text-align: center;
      }

      .ctab-eyebrow {
        font-family: 'Figtree', sans-serif;
        font-size: 0.8rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--cyan);
        margin-bottom: 1rem;
      }

      .ctab-body {
        font-size: 0.95rem;
        line-height: 1.7;
        color: rgba(255, 255, 255, 0.75);
        max-width: 540px;
        margin: 0 auto 1.5rem;
      }

      /* Lite YouTube embed (inline for reliability) */
      .lite-yt {
        position: relative;
        width: 100%;
        padding-bottom: 56.25%;
        border-radius: 16px;
        overflow: hidden;
        background: #000;
      }

      .lite-yt iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: 0;
      }

      .lite-yt-thumb {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        cursor: pointer;
      }

      .lite-yt-thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .lite-yt-play {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 68px;
        height: 48px;
        pointer-events: none;
      }

      .lite-yt-play svg {
        width: 100%;
        height: 100%;
        filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
        transition: transform 0.15s ease;
      }

      .lite-yt-thumb:hover .lite-yt-play svg {
        transform: scale(1.08);
      }

      .ctab-yt {
        max-width: 480px;
        margin: 0 auto 1.5rem;
        border-radius: 12px;
      }

      .ctab-headline {
        font-size: clamp(1.3rem, 3vw, 1.8rem);
        color: #fff;
        margin-bottom: 1.5rem;
      }

      .ctab-form {
        display: flex;
        gap: 0;
        max-width: 440px;
        margin: 0 auto;
      }

      .ctab-input {
        flex: 1;
        padding: 0.8rem 1rem;
        border: 2px solid rgba(255, 255, 255, 0.15);
        border-right: none;
        border-radius: 8px 0 0 8px;
        font-family: 'Onest', system-ui, sans-serif;
        font-size: 0.95rem;
        color: #fff;
        background: rgba(255, 255, 255, 0.08);
        outline: none;
        transition: border-color 0.2s ease;
      }

      .ctab-input::placeholder {
        color: rgba(255, 255, 255, 0.4);
      }

      .ctab-input:focus {
        border-color: var(--cyan);
      }

      .ctab-submit {
        font-family: 'Onest', system-ui, sans-serif;
        background: var(--cyan);
        color: var(--navy);
        padding: 0.8rem 1.5rem;
        border: 2px solid var(--cyan);
        border-radius: 0 8px 8px 0;
        font-weight: 600;
        font-size: 0.9rem;
        cursor: pointer;
        white-space: nowrap;
        transition: background 0.2s ease, border-color 0.2s ease;
      }

      .ctab-submit:hover {
        background: #00b8cc;
        border-color: #00b8cc;
      }

      .ctab-submit:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .ctab-loading {
        display: none;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 0;
        font-size: 0.9rem;
        color: rgba(255, 255, 255, 0.5);
      }

      .ctab-loading .spinner {
        width: 18px;
        height: 18px;
        border: 2px solid rgba(255, 255, 255, 0.15);
        border-top-color: var(--cyan);
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      .ctab-error {
        display: none;
        flex-direction: column;
        gap: 0.5rem;
        margin-top: 0.5rem;
      }

      .ctab-error-message {
        font-size: 0.85rem;
        color: #ff6b6b;
      }

      .ctab-error-retry {
        font-family: 'Onest', system-ui, sans-serif;
        background: none;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 6px;
        padding: 0.4rem 1rem;
        font-size: 0.85rem;
        color: rgba(255, 255, 255, 0.6);
        cursor: pointer;
      }

      .ctab-success {
        display: none;
        align-items: center;
        gap: 0.5rem;
        color: #4ade80;
        font-weight: 600;
        font-size: 0.95rem;
      }

      /* Share Block */
      .results-share {
        max-width: 720px;
        width: 100%;
        text-align: center;
        margin-bottom: 2rem;
        animation: fadeUp 0.6s ease 0.3s both;
      }

      .results-share p {
        font-size: 0.95rem;
        color: var(--navy-60);
        margin-bottom: 1rem;
      }

      .share-buttons {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
        justify-content: center;
      }

      .share-btn {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        border: 1px solid var(--navy-15);
        border-radius: 8px;
        padding: 0.6rem 1rem;
        background: #fff;
        cursor: pointer;
        font-family: 'Onest', system-ui, sans-serif;
        font-size: 0.85rem;
        font-weight: 500;
        color: var(--navy-70);
        transition: border-color 0.2s ease, background 0.2s ease;
        text-decoration: none;
      }

      .share-btn:hover {
        border-color: var(--navy-40);
        background: var(--navy-04);
      }

      .share-btn svg {
        flex-shrink: 0;
      }

      /* Retake */
      .results-retake {
        font-family: 'Onest', system-ui, sans-serif;
        font-size: 0.9rem;
        color: var(--navy-40);
        background: none;
        border: none;
        cursor: pointer;
        text-decoration: underline;
        text-underline-offset: 3px;
      }

      .results-retake:hover {
        color: var(--navy-60);
      }

      /* ============================================
         Responsive
         ============================================ */
      @media (max-width: 640px) {
        .rcard {
          flex-direction: column;
        }

        .rcard-img {
          width: 100%;
          min-height: 240px;
          max-height: 300px;
        }

        .rcard-copy {
          padding: 1.5rem 1.25rem;
        }

        .ctab {
          padding: 1.75rem 1.25rem;
        }

        .ctab-form {
          flex-direction: column;
          gap: 0.75rem;
        }

        .ctab-input {
          border-right: 2px solid rgba(255, 255, 255, 0.15);
          border-radius: 8px;
        }

        .ctab-input:focus {
          border-color: var(--cyan);
        }

        .ctab-submit {
          border-radius: 8px;
        }

        .share-buttons {
          gap: 0.5rem;
        }

        .share-btn {
          flex: 1 1 calc(50% - 0.5rem);
          justify-content: center;
          min-width: 0;
        }

        .gender-options {

    <script>

      /* ============================================

      var QUESTIONS = [
        {

        {
          question: "Two of your kids have activities at the same time on Saturday, in opposite directions. What happens?",
          options: [
            { text: "I already knew. I reworked the carpool Tuesday night and texted the other parent.", score: 'keeper' },

      /* ============================================
         Quiz State
         ============================================ */
      var state = {
        currentQuestion: 0,

      function calculateResult() {
        var scores = { keeper: 0, hybrid: 0, chaser: 0 };
        for (var i = 0; i < state.answers.length; i++) {
          if (state.answers[i] !== null) {
            var category = QUESTIONS[i].options[state.answers[i]].score;
            scores[category]++;
          }
        }
        state.scores = scores;

        if (scores.keeper > scores.chaser && scores.keeper > scores.hybrid) return 'keeper';
        if (scores.chaser > scores.keeper && scores.chaser > scores.hybrid) return 'chaser';
        return 'hybrid';
      }

      function resetQuiz() {
        state.currentQuestion = 0;
        state.answers = [null, null, null, null, null];
        state.scores = { keeper: 0, hybrid: 0, chaser: 0 };
        state.gender = null;
      }

      /* ============================================
         Results Data (with gender variants)
         ============================================ */
      var RESULTS = {

            woman: "Oof. 71% of family cognitive tasks fall on one parent, and somehow you ended up with a grab bag of the rest. Half in control, half in the dark, fully over it. No wonder nothing ever feels done.",
            man: "Oof. In dual-earner households, 54% say one parent does more schedule management. But \u2018more\u2019 isn\u2019t \u2018all.\u2019 You\u2019re carrying real weight that nobody counts. And somehow you still feel like you\u2019re not doing enough.",
            nonbinary: "Oof. You\u2019re the parent who nails the sports schedule and completely forgets picture day. You own some of it, you\u2019re winging the rest, and you\u2019re exhausted from doing both. That\u2019s not a system. That\u2019s survival mode."
          },
          footnotes: {
            '': "",
            woman: "Socius, 2025",
            man: "Pew Research Center, 2023",
            nonbinary: ""
          },
          cta: {
            eyebrow: "SuperDuper doesn\u2019t care which hat you\u2019re wearing today.",
            body: "It pulls everything into one place so you can stop splitting your brain between the things you track and the things you\u2019ve given up on.",
            headline: "Take your week back."
          },
          shareText: "I\u2019m The Hybrid. Half Keeper, half Chaser, fully overwhelmed. Find out what kind of parent you are."
        }
      };

      var quizResult = null;
      var emailCaptured = false;

      /* ============================================
         Quiz Rendering & Transitions
         ============================================ */
      var isTransitioning = false;
      var LETTERS = ['A', 'B', 'C'];

      function buildQuestionCard(index) {
        var q = QUESTIONS[index];
        var card = document.createElement('div');
        card.className = 'quiz-question-card';

        var h2 = document.createElement('h2');
        h2.className = 'quiz-question-text';
        h2.textContent = q.question;
        card.appendChild(h2);

        var optionsDiv = document.createElement('div');
        optionsDiv.className = 'quiz-options';

        for (var i = 0; i < q.options.length; i++) {
          (function(optIndex) {
            var btn = document.createElement('button');
            btn.className = 'quiz-option';
            if (state.answers[index] === optIndex) {
              btn.classList.add('quiz-option--selected');
            }
            btn.setAttribute('type', 'button');

            btn.innerHTML =
              '<span class="quiz-option-letter">' + LETTERS[optIndex] + '</span>' +
              '<span class="quiz-option-text">' + q.options[optIndex].text + '</span>' +
              '<span class="quiz-option-check"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="20" height="20"><path fill-rule="evenodd" d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16Zm3.857-9.809a.75.75 0 0 0-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 1 0-1.06 1.061l2.5 2.5a.75.75 0 0 0 1.137-.089l4-5.5Z" clip-rule="evenodd" /></svg></span>';

            btn.addEventListener('click', function() {
              selectOption(index, optIndex);
            });

            optionsDiv.appendChild(btn);
          })(i);
        }

        card.appendChild(optionsDiv);
        return card;
      }

      function renderQuestion(index) {
        state.currentQuestion = index;
        var body = document.getElementById('quiz-body');
        body.innerHTML = '';
        var card = buildQuestionCard(index);
        body.appendChild(card);
        updateProgress();
      }

      function updateProgress() {
        var pct = ((state.currentQuestion + 1) / QUESTIONS.length) * 100;
        document.getElementById('quiz-progress-fill').style.width = pct + '%';
        document.getElementById('quiz-progress-label').textContent = 'Q' + (state.currentQuestion + 1) + ' of ' + QUESTIONS.length;

        var backBtn = document.getElementById('quiz-back');
        if (state.currentQuestion === 0) {
          backBtn.classList.add('hidden');
        } else {
          backBtn.classList.remove('hidden');
        }
      }

      function selectOption(questionIndex, optionIndex) {
        if (isTransitioning) return;

        state.answers[questionIndex] = optionIndex;

        var options = document.querySelectorAll('#quiz-body .quiz-option');
        options.forEach(function(opt, i) {
          opt.classList.toggle('quiz-option--selected', i === optionIndex);
        });

        try {
          posthog.capture('quiz_question_answered', {
            question: questionIndex + 1,
            answer: QUESTIONS[questionIndex].options[optionIndex].score
          });
        } catch(e) {}

        setTimeout(function() {
          advanceQuestion();
        }, 500);
      }

      function advanceQuestion() {
        if (isTransitioning) return;
        var nextIndex = state.currentQuestion + 1;

        if (nextIndex >= QUESTIONS.length) {
          showGenderScreen();
          return;
        }

        isTransitioning = true;
        var body = document.getElementById('quiz-body');
        var currentCard = body.querySelector('.quiz-question-card');

        currentCard.classList.add('slide-out-left');

        var nextCard = buildQuestionCard(nextIndex);
        nextCard.classList.add('slide-in-right');
        body.appendChild(nextCard);

        nextCard.offsetHeight;
        nextCard.classList.remove('slide-in-right');

        state.currentQuestion = nextIndex;
        updateProgress();

        setTimeout(function() {
          if (currentCard.parentNode) currentCard.parentNode.removeChild(currentCard);
          isTransitioning = false;
        }, 350);
      }

      function goBack() {
        if (isTransitioning || state.currentQuestion === 0) return;
        isTransitioning = true;

        var prevIndex = state.currentQuestion - 1;
        var body = document.getElementById('quiz-body');
        var currentCard = body.querySelector('.quiz-question-card');

        currentCard.classList.add('slide-out-right');

        var prevCard = buildQuestionCard(prevIndex);
        prevCard.classList.add('slide-in-left');
        body.appendChild(prevCard);

        prevCard.offsetHeight;
        prevCard.classList.remove('slide-in-left');

        state.currentQuestion = prevIndex;
        updateProgress();

        setTimeout(function() {
          if (currentCard.parentNode) currentCard.parentNode.removeChild(currentCard);
          isTransitioning = false;
        }, 350);
      }

      document.getElementById('quiz-back').addEventListener('click', goBack);

      /* ============================================
         Gender Selection Screen
         ============================================ */
      function showGenderScreen() {
        quizResult = calculateResult();
        try { posthog.capture('quiz_completed', { result: quizResult, scores: state.scores }); } catch(e) {}
        showScreen('screen-gender');
      }

      document.querySelectorAll('.gender-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          state.gender = this.getAttribute('data-gender');
          try { posthog.capture('quiz_gender_selected', { gender: state.gender, result: quizResult }); } catch(e) {}
          showResults();
        });
      });

      /* ============================================
         Results Screen
         ============================================ */
      function getGenderKey() {
        var g = state.gender;
        if (g === 'woman' || g === 'man') return g;
        if (g === 'nonbinary') return 'nonbinary';
        return '';
      }

      function getImageKey() {
        var g = state.gender;
        if (g === 'woman') return 'woman';
        if (g === 'man') return 'man';
        return 'nb';
      }

      function showResults() {
        var result = RESULTS[quizResult];
        var genderKey = getGenderKey();
        var imageKey = getImageKey();

        // Persona image
        var img = document.getElementById('rcard-persona-img');
        img.src = result.images[imageKey];
        img.alt = result.title;

        // Copy panel
        var copyPanel = document.getElementById('rcard-copy');
        var html = '<h1 class="rcard-title rcard-title--' + quizResult + '">' + result.title + '</h1>';
        html += '<p class="rcard-tagline">' + result.tagline + '</p>';
        html += '<p class="rcard-validation">' + result.validation[genderKey] + '</p>';
        var footnote = result.footnotes[genderKey];
        if (footnote) {
          html += '<p class="rcard-footnote">' + footnote + '</p>';
        }
        copyPanel.innerHTML = html;

        // CTA block
        var ctab = document.getElementById('ctab');
        var ctaHtml = '<p class="ctab-eyebrow">' + result.cta.eyebrow + '</p>';
        ctaHtml += '<p class="ctab-body">' + result.cta.body + '</p>';
        ctaHtml += '<div class="lite-yt ctab-yt" data-yt-id="q_b60e1D79w"><div class="lite-yt-thumb" role="button" aria-label="Play video" tabindex="0"><img src="https://i.ytimg.com/vi/q_b60e1D79w/maxresdefault.jpg" alt="Watch SuperDuper demo" /><span class="lite-yt-play"><svg viewBox="0 0 68 48" xmlns="http://www.w3.org/2000/svg"><path d="M66.52 7.74c-.78-2.93-2.49-5.41-5.42-6.19C55.79.13 34 0 34 0S12.21.13 6.9 1.55c-2.93.78-4.63 3.26-5.42 6.19C.06 13.05 0 24 0 24s.06 10.95 1.48 16.26c.78 2.93 2.49 5.41 5.42 6.19C12.21 47.87 34 48 34 48s21.79-.13 27.1-1.55c2.93-.78 4.64-3.26 5.42-6.19C67.94 34.95 68 24 68 24s-.06-10.95-1.48-16.26z" fill="#FF0000"/><path d="M45 24 27 14v20" fill="#fff"/></svg></span></div></div>';
        ctaHtml += '<h2 class="ctab-headline">' + result.cta.headline + '</h2>';
        ctaHtml += '<div id="ctab-form-wrap">';

        if (emailCaptured) {
          ctaHtml += '<div class="ctab-success" style="display:flex;"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="20" height="20"><path fill-rule="evenodd" d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16Zm3.857-9.809a.75.75 0 0 0-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 1 0-1.06 1.061l2.5 2.5a.75.75 0 0 0 1.137-.089l4-5.5Z" clip-rule="evenodd" /></svg> You\u2019re on the list!</div>';
        } else {
          ctaHtml += '<form class="ctab-form" id="ctab-email-form">';
          ctaHtml += '<input type="email" class="ctab-input" id="ctab-email" placeholder="you@email.com" required />';
          ctaHtml += '<button type="submit" class="ctab-submit" id="ctab-submit">Join the Waiting List</button>';
          ctaHtml += '</form>';
          ctaHtml += '<div class="ctab-loading" id="ctab-loading"><div class="spinner"></div> Joining...</div>';
          ctaHtml += '<div class="ctab-error" id="ctab-error">';
          ctaHtml += '<span class="ctab-error-message" id="ctab-error-message">Something went wrong.</span>';
          ctaHtml += '<button type="button" class="ctab-error-retry" id="ctab-retry">Try again</button>';
          ctaHtml += '</div>';
          ctaHtml += '<div class="ctab-success" id="ctab-success"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="20" height="20"><path fill-rule="evenodd" d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16Zm3.857-9.809a.75.75 0 0 0-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 1 0-1.06 1.061l2.5 2.5a.75.75 0 0 0 1.137-.089l4-5.5Z" clip-rule="evenodd" /></svg> You\u2019re on the list!</div>';

        var shareUrl = 'https://superduperlabs.com/keeper-or-chaser?utm_source=quiz_share&utm_content=' + quizResult;

        document.getElementById('share-sms').href = 'sms:?&body=' + encodeURIComponent(shareText);
        document.getElementById('share-linkedin').href = 'https://www.linkedin.com/sharing/share-offsite/?url=' + encodeURIComponent(shareUrl);

        showScreen('screen-results');

      /* ============================================
         Email Submission
         ============================================ */
      function submitEmail(email, onSuccess, onError) {
        var now = Date.now();
        var prev = localStorage.getItem('loops-form-timestamp');
        if (prev && Number(prev) + 60000 > now) {
          onError('Too many signups, please try again in a little while');
          return;
        }
        localStorage.setItem('loops-form-timestamp', now);

        var formBody = 'userGroup=&mailingLists=&email=' + encodeURIComponent(email) +
          '&quizResult=' + encodeURIComponent(quizResult) +
          '&gender=' + encodeURIComponent(state.gender || '') +
          '&joinedWaitlist=' + encodeURIComponent(new Date().toISOString());

        fetch('https://app.loops.so/api/newsletter-form/cmkvrcj6o00lc0i1fhymv7jyi', {
          method: 'POST',
          body: formBody,
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
        })
        .then(function(res) {
          if (res.ok) {
            emailCaptured = true;
            try {
              posthog.identify(email, { email: email, gender: state.gender || '' });
              posthog.capture('quiz_email_captured', { result: quizResult, gender: state.gender || '' });
            } catch(e) {}
            onSuccess();
          } else {
            return res.json().then(function(data) {
              throw new Error(data.message || res.statusText);
            });
          }
        })
        .catch(function(err) {
          var msg = err.message === 'Failed to fetch'
            ? 'Too many signups, please try again in a little while'
            : (err.message || 'Something went wrong. Please try again.');
          localStorage.setItem('loops-form-timestamp', '');
          onError(msg);
        });
      }

      function attachEmailHandler() {
        var form = document.getElementById('ctab-email-form');
        if (!form) return;

        form.addEventListener('submit', function(e) {
          e.preventDefault();
          var emailInput = document.getElementById('ctab-email');
          var submitBtn = document.getElementById('ctab-submit');
          var loading = document.getElementById('ctab-loading');
          var errorEl = document.getElementById('ctab-error');
          var errorMsg = document.getElementById('ctab-error-message');
          var successEl = document.getElementById('ctab-success');
          var email = emailInput.value;

          submitBtn.style.display = 'none';
          emailInput.style.display = 'none';
          loading.style.display = 'flex';
          errorEl.style.display = 'none';

          submitEmail(email, function() {
            loading.style.display = 'none';
            successEl.style.display = 'flex';
          }, function(msg) {
            loading.style.display = 'none';
            errorEl.style.display = 'flex';
            errorMsg.textContent = msg;
          });
        });

        var retryBtn = document.getElementById('ctab-retry');
        if (retryBtn) {
          retryBtn.addEventListener('click', function() {
            document.getElementById('ctab-error').style.display = 'none';
            document.getElementById('ctab-email').style.display = '';
            document.getElementById('ctab-submit').style.display = '';
          });
        }
      }

      /* ============================================
         Share Handlers
         ============================================ */
      document.getElementById('share-copy').addEventListener('click', function() {
        var shareUrl = 'https://superduperlabs.com/keeper-or-chaser?utm_source=quiz_share&utm_content=' + (quizResult || '');
        navigator.clipboard.writeText(shareUrl).then(function() {
          var btn = document.getElementById('share-copy');
          var span = btn.querySelector('span');
          span.textContent = 'Copied!';
          setTimeout(function() { span.textContent = 'Copy Link'; }, 2000);
        });
        try { posthog.capture('quiz_result_shared', { channel: 'copy_link', result: quizResult }); } catch(e) {}
      });

      document.getElementById('share-instagram').addEventListener('click', function() {
        var shareUrl = 'https://superduperlabs.com/keeper-or-chaser?utm_source=quiz_share&utm_content=' + (quizResult || '');
        navigator.clipboard.writeText(shareUrl).then(function() {
          var btn = document.getElementById('share-instagram');
          var span = btn.querySelector('span');
          span.textContent = 'Link copied! Paste in Instagram';
          setTimeout(function() { span.textContent = 'Instagram'; }, 3000);
        });
        try { posthog.capture('quiz_result_shared', { channel: 'instagram', result: quizResult }); } catch(e) {}
      });

      document.getElementById('share-sms').addEventListener('click', function() {
        try { posthog.capture('quiz_result_shared', { channel: 'sms', result: quizResult }); } catch(e) {}
      });

      document.getElementById('share-linkedin').addEventListener('click', function() {
        try { posthog.capture('quiz_result_shared', { channel: 'linkedin', result: quizResult }); } catch(e) {}
      });

      // Share overlay on result card image
      document.getElementById('rcard-share-btn').addEventListener('click', function() {
        var shareUrl = 'https://superduperlabs.com/keeper-or-chaser?utm_source=quiz_share&utm_content=' + (quizResult || '');
        if (navigator.share) {
          navigator.share({
            title: RESULTS[quizResult].title,
            text: RESULTS[quizResult].shareText,
            url: shareUrl
          }).catch(function() {});
        } else {
          navigator.clipboard.writeText(shareUrl).then(function() {
            var btn = document.getElementById('rcard-share-btn');
            btn.style.background = '#4ade80';
            setTimeout(function() { btn.style.background = ''; }, 1500);
          });
        }
        try { posthog.capture('quiz_result_shared', { channel: 'share_overlay', result: quizResult }); } catch(e) {}
      });

      // Retake
      document.getElementById('results-retake').addEventListener('click', function() {
        resetQuiz();
        quizResult = null;
        emailCaptured = false;
        showScreen('screen-intro');
      });

      /* ============================================
         Intro Screen Handler
         ============================================ */
      document.getElementById('btn-start').addEventListener('click', function() {
        try { posthog.capture('quiz_started'); } catch(e) {}
        showScreen('screen-quiz');
        renderQuestion(0);
      });
    </script>
