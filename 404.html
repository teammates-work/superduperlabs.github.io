<!doctype html>

<html lang="en">

  <head>

    <title>Page not found — SuperDuper</title>

    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width">
    <meta name="robots" content="noindex, nofollow">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700&family=Onest:wght@400;500&display=swap" rel="stylesheet">

    <style>

      *, *::before, *::after {
        box-sizing: border-box;
      }

      * {
        margin: 0;
      }

      html {
        font-size: 16px;
      }

      body {
        background: #FFF;
        color: #1B1464;
        display: grid;
        font-family: 'Onest', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: clamp(1rem, 2.5vw, 1.25rem);
        -webkit-font-smoothing: antialiased;
        font-weight: 400;
        line-height: 1.5;
        min-height: 100vh;
        place-items: center;
        text-rendering: optimizeLegibility;
        -webkit-text-size-adjust: 100%;
      }

      a {
        color: #E84F9A;
        font-weight: 500;
        text-decoration: underline;
        text-underline-offset: 0.1em;
      }

      a:hover {
        color: #DB2777;
      }

      main {
        display: grid;
        gap: 1.5em;
        padding: 2em;
        place-items: center;
        text-align: center;
      }

      main header img {
        height: 48px;
        width: auto;
      }

      main h1 {
        font-family: 'Fraunces', serif;
        font-size: clamp(1.5rem, 4vw, 2.5rem);
        font-weight: 700;
        letter-spacing: -0.02em;
        line-height: 1.2;
      }

      main article {
        width: min(100%, 28em);
      }

      main article p {
        color: rgba(27, 20, 100, 0.6);
        font-size: 90%;
      }

    </style>

  </head>

  <body>

    <main>
      <header>
        <img src="/images/logo-header.png" alt="SuperDuper">
      </header>
      <h1>Not so SuperDuper</h1>
      <article>
        <p>The page you were looking for doesn't exist. You may have mistyped the address or the page may have moved.</p>
        <p style="margin-top: 1em;"><a href="/">Back to SuperDuper</a></p>
      </article>
    </main>

  </body>

</html>
